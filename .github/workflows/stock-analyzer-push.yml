# 股票分析钉钉定时推送（GitHub Actions）
# 北京时间 09:00 / 11:30 / 14:30，每日触发（含周末与法定节假日）

name: Stock Analyzer Push

on:
  schedule:
    # UTC = 北京时间 - 8
    - cron: "0 1 * * *"   # 09:00 开盘前
    - cron: "30 3 * * *"  # 11:30 午盘
    - cron: "30 6 * * *"  # 14:30 尾盘
  workflow_dispatch:
    inputs:
      push_time:
        description: "推送时刻（09:00 / 11:30 / 14:30），留空则按当前北京时间推断"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "09:00"
          - "11:30"
          - "14:30"

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  push-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: stock-analyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stock-analyzer/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          POSITIONS: ${{ secrets.POSITIONS }}
          STOCK_CODE: ${{ vars.STOCK_CODE }}
          STOCK_NAME: ${{ vars.STOCK_NAME }}
          STOCK_MARKET: ${{ vars.STOCK_MARKET }}
          LLM_ENABLED: ${{ vars.LLM_ENABLED }}
          WEB_SEARCH_ENABLED: ${{ vars.WEB_SEARCH_ENABLED }}
          WEB_SEARCH_API_KEY: ${{ secrets.WEB_SEARCH_API_KEY }}
          STOCK_THEMES: ${{ vars.STOCK_THEMES }}
          REPORT_WEB_ENABLED: ${{ vars.REPORT_WEB_ENABLED }}
          REPORT_WEB_BASE_URL: ${{ vars.REPORT_WEB_BASE_URL }}
        run: |
          cat > .env << EOF
          DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
          DINGTALK_SECRET=${DINGTALK_SECRET}
          STOCK_CODE=${STOCK_CODE:-301075}
          STOCK_NAME=${STOCK_NAME:-多瑞生物}
          STOCK_MARKET=${STOCK_MARKET:-sz}
          PUSH_TIMES=09:00,11:30,14:30
          MANUAL_RUN=true
          KLINE_DAYS=60
          LOG_LEVEL=INFO
          LLM_ENABLED=${LLM_ENABLED:-true}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
          DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
          POSITIONS=${POSITIONS:-[]}
          WEB_SEARCH_ENABLED=${WEB_SEARCH_ENABLED:-false}
          WEB_SEARCH_PROVIDER=tavily
          WEB_SEARCH_API_KEY=${WEB_SEARCH_API_KEY}
          STOCK_THEMES=${STOCK_THEMES:-GLP-1,司美格鲁肽,多肽原料药}
          PRICE_MOVE_MIN_PCT=2.0
          REPORT_WEB_ENABLED=${REPORT_WEB_ENABLED:-true}
          REPORT_WEB_BASE_URL=${REPORT_WEB_BASE_URL:-}
          REPORT_WEB_CDN=${REPORT_WEB_CDN:-ghproxy}
          REPORT_WEB_GHPROXY=${REPORT_WEB_GHPROXY:-https://ghfast.top}
          GITHUB_REPO=susu108/AI_Stock_Analysis
          GITHUB_BRANCH=main
          REPORT_WEB_OUTPUT_DIR=docs/reports
          REPORT_WEB_RETENTION=30
          EOF

      - name: Resolve push_time
        id: resolve_time
        run: |
          INPUT="${{ github.event.inputs.push_time }}"
          if [ -n "$INPUT" ]; then
            echo "push_time=$INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "0 1 * * *")  echo "push_time=09:00" >> "$GITHUB_OUTPUT" ;;
            "30 3 * * *") echo "push_time=11:30" >> "$GITHUB_OUTPUT" ;;
            "30 6 * * *") echo "push_time=14:30" >> "$GITHUB_OUTPUT" ;;
            *)             echo "push_time=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run daily analysis and push
        run: |
          PT="${{ steps.resolve_time.outputs.push_time }}"
          CMD=(python main.py --scheduled)
          if [ -n "$PT" ]; then
            CMD+=(--push-time "$PT")
          fi
          "${CMD[@]}"

      - name: Publish report to GitHub Pages
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ || true
          if git diff --staged --quiet; then
            echo "No report changes to publish"
          else
            git commit -m "chore: update stock detail report [skip ci]"
            git push
          fi
