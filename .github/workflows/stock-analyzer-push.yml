# 股票分析钉钉定时推送（GitHub Actions）
# 北京时间 09:00 / 11:30 / 14:30，仅工作日运行；非交易日由程序内 IsTradingDay 跳过

name: Stock Analyzer Push

on:
  schedule:
    # UTC = 北京时间 - 8
    - cron: "0 1 * * 1-5"   # 09:00 开盘前
    - cron: "30 3 * * 1-5"  # 11:30 午盘
    - cron: "30 6 * * 1-5"  # 14:30 尾盘
  workflow_dispatch:
    inputs:
      push_time:
        description: "推送时刻（09:00 / 11:30 / 14:30），留空则按当前北京时间推断"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "09:00"
          - "11:30"
          - "14:30"
      force_trading_day:
        description: "手动触发时忽略交易日校验（测试用）"
        required: false
        default: false
        type: boolean

env:
  TZ: Asia/Shanghai

jobs:
  push-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: stock-analyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stock-analyzer/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          POSITIONS: ${{ secrets.POSITIONS }}
          STOCK_CODE: ${{ vars.STOCK_CODE }}
          STOCK_NAME: ${{ vars.STOCK_NAME }}
          STOCK_MARKET: ${{ vars.STOCK_MARKET }}
          LLM_ENABLED: ${{ vars.LLM_ENABLED }}
        run: |
          cat > .env << EOF
          DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
          DINGTALK_SECRET=${DINGTALK_SECRET}
          STOCK_CODE=${STOCK_CODE:-301075}
          STOCK_NAME=${STOCK_NAME:-多瑞生物}
          STOCK_MARKET=${STOCK_MARKET:-sz}
          PUSH_TIMES=09:00,11:30,14:30
          MANUAL_RUN=true
          KLINE_DAYS=60
          LOG_LEVEL=INFO
          LLM_ENABLED=${LLM_ENABLED:-true}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
          DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
          POSITIONS=${POSITIONS:-[]}
          EOF

      - name: Resolve push_time
        id: resolve_time
        run: |
          INPUT="${{ github.event.inputs.push_time }}"
          if [ -n "$INPUT" ]; then
            echo "push_time=$INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "0 1 * * 1-5")  echo "push_time=09:00" >> "$GITHUB_OUTPUT" ;;
            "30 3 * * 1-5") echo "push_time=11:30" >> "$GITHUB_OUTPUT" ;;
            "30 6 * * 1-5") echo "push_time=14:30" >> "$GITHUB_OUTPUT" ;;
            *)              echo "push_time=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run daily analysis and push
        run: |
          PT="${{ steps.resolve_time.outputs.push_time }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_trading_day }}" = "true" ]; then
            CMD=(python main.py --now)
          else
            CMD=(python main.py --scheduled)
          fi
          if [ -n "$PT" ]; then
            CMD+=(--push-time "$PT")
          fi
          "${CMD[@]}"
