# 资讯哨兵：命中强催化后即时推送（与定时 09:00/11:30/14:30 并存）
# 由 cron-job.org repository_dispatch type=stock-news-watch 触发
# 建议 cron（Asia/Shanghai）：
#   Job1: */15 9-14 * * 1-5  → 工作日盘中约每 15 分钟（窗外由门控丢弃）
#   Job2: 0 18,22 * * *      → 每天 18:00 / 22:00（含周末）

name: Stock News Watch

on:
  repository_dispatch:
    types: [stock-news-watch]
  workflow_dispatch:
    inputs:
      ignore_window:
        description: "忽略交易时段窗口（测试用）"
        required: false
        default: false
        type: boolean

env:
  TZ: Asia/Shanghai

permissions:
  contents: read
  actions: write

jobs:
  news-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # 同群串行：避免重叠 run 都读到空去重文件而重复推送
    concurrency:
      group: stock-news-watch-${{ matrix.group }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        group: [pharma, oil_short, nonferrous]
    defaults:
      run:
        working-directory: stock-analyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stock-analyzer/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DINGTALK_WEBHOOK_OIL: ${{ secrets.DINGTALK_WEBHOOK_OIL }}
          DINGTALK_SECRET_OIL: ${{ secrets.DINGTALK_SECRET_OIL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          POSITIONS: ${{ secrets.POSITIONS }}
          STOCK_CODE: ${{ vars.STOCK_CODE }}
          STOCK_NAME: ${{ vars.STOCK_NAME }}
          STOCK_MARKET: ${{ vars.STOCK_MARKET }}
          LLM_ENABLED: ${{ vars.LLM_ENABLED }}
          WEB_SEARCH_ENABLED: ${{ vars.WEB_SEARCH_ENABLED }}
          WEB_SEARCH_API_KEY: ${{ secrets.WEB_SEARCH_API_KEY }}
          STOCK_THEMES: ${{ vars.STOCK_THEMES }}
          STOCK_BUSINESS: ${{ vars.STOCK_BUSINESS }}
          STOCK_PROFILES: ${{ vars.STOCK_PROFILES }}
          DINGTALK_REPORT_MODE: ${{ vars.DINGTALK_REPORT_MODE }}
          SECTOR_PEER_WATCH: ${{ vars.SECTOR_PEER_WATCH }}
        run: |
          cat > .env << EOF
          DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
          DINGTALK_SECRET=${DINGTALK_SECRET}
          DINGTALK_WEBHOOK_OIL=${DINGTALK_WEBHOOK_OIL}
          DINGTALK_SECRET_OIL=${DINGTALK_SECRET_OIL}
          STOCK_CODE=${STOCK_CODE:-301075}
          STOCK_NAME=${STOCK_NAME:-多瑞生物}
          STOCK_MARKET=${STOCK_MARKET:-sz}
          PUSH_TIMES=09:00,11:30,14:30
          MANUAL_RUN=false
          ENABLE_LOCAL_SCHEDULER=false
          KLINE_DAYS=60
          LOG_LEVEL=INFO
          LLM_ENABLED=${LLM_ENABLED:-true}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
          DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
          POSITIONS=${POSITIONS:-[]}
          WEB_SEARCH_ENABLED=${WEB_SEARCH_ENABLED:-false}
          WEB_SEARCH_PROVIDER=tavily
          WEB_SEARCH_API_KEY=${WEB_SEARCH_API_KEY}
          STOCK_THEMES=${STOCK_THEMES:-GLP-1,司美格鲁肽,多肽原料药}
          STOCK_BUSINESS=${STOCK_BUSINESS:-}
          STOCK_PROFILES=${STOCK_PROFILES:-}
          DINGTALK_REPORT_MODE=${DINGTALK_REPORT_MODE:-compact}
          PRICE_MOVE_MIN_PCT=2.0
          REPORT_WEB_ENABLED=false
          SECTOR_PEER_WATCH=${SECTOR_PEER_WATCH:-}
          EOF

      - name: Resolve Shanghai day
        id: date
        run: echo "day=$(TZ=Asia/Shanghai date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore news-alert dedup cache
        id: dedup-cache
        uses: actions/cache/restore@v4
        with:
          path: stock-analyzer/.news_alert_dedup.json
          key: news-alert-dedup-${{ matrix.group }}-${{ steps.date.outputs.day }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            news-alert-dedup-${{ matrix.group }}-${{ steps.date.outputs.day }}-
            news-alert-dedup-${{ matrix.group }}-

      - name: Log dedup cache status
        run: |
          echo "cache-hit=${{ steps.dedup-cache.outputs.cache-hit }}"
          echo "cache-matched-key=${{ steps.dedup-cache.outputs.cache-matched-key }}"
          if [ -f .news_alert_dedup.json ]; then
            echo "dedup file bytes=$(wc -c < .news_alert_dedup.json)"
            head -c 500 .news_alert_dedup.json || true
          else
            echo "dedup file missing after restore"
          fi

      - name: Window gate (Asia/Shanghai)
        id: window
        run: |
          if [ "${{ github.event.inputs.ignore_window }}" = "true" ]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
            echo "ignore_window flag set"
            exit 0
          fi
          # 与 main.py IsInNewsWatchWindow 一致：
          # 工作日 09:30–11:30 / 13:00–15:00；每天 18:00/22:00 ±10 分钟
          DOW=$(TZ=Asia/Shanghai date +%u)   # 1=Mon ... 7=Sun
          HM=$(TZ=Asia/Shanghai date +%H%M)
          cur_h=$((10#$HM / 100))
          cur_m=$((10#$HM % 100))
          cur_min=$((cur_h * 60 + cur_m))
          in_window=false

          for slot in 1800 2200; do
            sh=$((10#$slot / 100))
            sm=$((10#$slot % 100))
            slot_min=$((sh * 60 + sm))
            diff=$((cur_min - slot_min))
            if [ "$diff" -lt 0 ]; then diff=$((-diff)); fi
            if [ "$diff" -le 10 ]; then
              in_window=true
              break
            fi
          done

          if [ "$in_window" != "true" ] && [ "$DOW" -le 5 ]; then
            if { [ "$cur_min" -ge $((9 * 60 + 30)) ] && [ "$cur_min" -le $((11 * 60 + 30)) ]; } || \
               { [ "$cur_min" -ge $((13 * 60)) ] && [ "$cur_min" -le $((15 * 60)) ]; }; then
              in_window=true
            fi
          fi

          if [ "$in_window" = "true" ]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
            echo "in news-watch window (HM=$HM DOW=$DOW)"
          else
            echo "in_window=false" >> "$GITHUB_OUTPUT"
            echo "outside news-watch window, skip (HM=$HM DOW=$DOW)"
          fi

      - name: Ensure dedup file exists
        if: steps.window.outputs.in_window == 'true'
        run: |
          if [ ! -f .news_alert_dedup.json ]; then
            echo '{}' > .news_alert_dedup.json
          fi

      - name: Run news watch
        if: steps.window.outputs.in_window == 'true'
        run: |
          GROUP="${{ matrix.group }}"
          IGNORE=""
          if [ "${{ github.event.inputs.ignore_window }}" = "true" ]; then
            IGNORE="--ignore-watch-window"
          fi
          echo "Running news-watch group=$GROUP $IGNORE"
          python main.py --news-watch --group "$GROUP" $IGNORE

      - name: Save news-alert dedup cache
        if: steps.window.outputs.in_window == 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: stock-analyzer/.news_alert_dedup.json
          key: news-alert-dedup-${{ matrix.group }}-${{ steps.date.outputs.day }}-${{ github.run_id }}-${{ github.run_attempt }}
